<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>
    <style>
        body {
            background-color: #fff0f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        h1 {
            color: #ff69b4;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ffc0cb;
            border-radius: 8px;
        }

        button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #ff1493;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My To-Do</h1>

    <form>
        <input type="text" placeholder="Item ID" required>
        <input type="text" placeholder="Item UUID" required>
        <input type="text" placeholder="Item Hash" required>
        <input type="text" placeholder="Item Name" required>
        <input type="text" placeholder="Item Description" required>
        <button type="submit">Add Item</button>
    </form>
</div>

</body>
</html>
